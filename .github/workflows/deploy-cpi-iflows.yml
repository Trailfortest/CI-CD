name: Deploy IFlows to SAP Integration Suite

on:
  push:
    branches:
      - main  # Change this to your target branch or use 'workflow_dispatch' for manual triggers.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up environment variables
        env:
          CPI_CLIENT_ID: ${{ secrets.CPI_CLIENT_ID }}
          CPI_CLIENT_SECRET: ${{ secrets.CPI_CLIENT_SECRET }}
          CPI_HOST: ${{ secrets.CPI_HOST }}
          CPI_TOKEN_URL: ${{ secrets.CPI_TOKEN_URL }}
        run: |
          echo "Setting up environment variables"

      - name: Get OAuth Token
        run: |
          echo "Generating OAuth Token..."
          TOKEN_RESPONSE=$(curl -s -X POST "${CPI_TOKEN_URL}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CPI_CLIENT_ID}" \
            -d "client_secret=${CPI_CLIENT_SECRET}")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "Error: Token generation failed"
            exit 1
          fi
          echo "$TOKEN" > token.txt
          echo "Token saved as token.txt"

      - name: Deploy iFlows
        run: |
          # Assuming you have a JSON file with iFlow IDs to deploy
          IFLW_JSON_FILE="github/workflows/Deployment_INTEGRATION_FLOW.json"  # Change this to your specific path
          echo "Deploying iFlows from $IFLW_JSON_FILE"
          
          IFLW_LIST=$(jq -c '.IntegrationFlows[]' "$IFLW_JSON_FILE")
          
          for IFLOW in $IFLW_LIST; do
            IFLW_ID=$(echo "$IFLOW" | jq -r '.ArtifactID')
            IFLW_NAME=$(echo "$IFLOW" | jq -r '.ArtifactName')

            echo "Deploying $IFLW_NAME ($IFLW_ID)..."
            DEPLOY_RESPONSE=$(curl -s -X POST "${CPI_HOST}/api/v1/DeployIntegrationDesigntimeArtifact?Id=${IFLW_ID}&Version=Active" \
              -H "Authorization: Bearer $(<token.txt)" \
              -H "Accept: application/json")

            if [[ $(echo "$DEPLOY_RESPONSE" | jq -r '.error') ]]; then
              echo "Failed to deploy $IFLW_NAME: $(echo "$DEPLOY_RESPONSE" | jq -r '.error.message')"
            else
              echo "Successfully deployed $IFLW_NAME"
            fi
          done
