#!/bin/bash

set -e  # Exit immediately if a command exits with a non-zero status

# Load environment variables (this should be set in your GitHub Actions workflow)
CPI_CLIENT_ID="${{ secrets.CPI_CLIENT_ID }}"
CPI_CLIENT_SECRET="${{ secrets.CPI_CLIENT_SECRET }}"
CPI_TOKEN_URL="${{ secrets.CPI_TOKEN_URL }}"
CPI_HOST="${{ secrets.CPI_HOST }}"
ACTION="${1}"  # Accept action (deploy or undeploy) as the first argument

if [[ "$ACTION" != "deploy" && "$ACTION" != "undeploy" ]]; then
    echo "ERROR: Action must be 'deploy' or 'undeploy'."
    exit 1
fi

# Get OAuth token function
get_token() {
    BODY=$(curl -s -X POST \
        "${CPI_TOKEN_URL}" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "grant_type=client_credentials" \
        -d "client_id=${CPI_CLIENT_ID}" \
        -d "client_secret=${CPI_CLIENT_SECRET}")

    TOKEN=$(printf '%s' "${BODY}" | jq -r '.access_token // empty' 2>/dev/null || true)

    if [ "${#TOKEN}" -lt 10 ]; then
        echo "ERROR: Token is empty or too short"
        exit 1
    fi

    echo "Token retrieved successfully."
}

# Get the token
get_token

# Initialize a summary for deployment results
DEPLOY_SUMMARY=()
FAILED=0

# Read integration flow details from a JSON file
while IFS= read -r IFLOW; do
    ARTIFACT_ID=$(echo "$IFLOW" | jq -r '.ArtifactID')
    ARTIFACT_NAME=$(echo "$IFLOW" | jq -r '.ArtifactName')
    
    echo "=============================================="
    echo "Processing IFlow: $ARTIFACT_NAME (ID: $ARTIFACT_ID)"
    
    if [[ "$ACTION" == "undeploy" ]]; then
        echo "API: DELETE ${CPI_HOST}/api/v1/IntegrationRuntimeArtifacts('${ARTIFACT_ID}')"
        curl_response=$(curl -s -w "\n%{http_code}" \
            -X DELETE "${CPI_HOST}/api/v1/IntegrationRuntimeArtifacts('${ARTIFACT_ID}')" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json")
    else
        echo "API: POST ${CPI_HOST}/api/v1/DeployIntegrationDesigntimeArtifact?Id='${ARTIFACT_ID}'&Version='active'"
        curl_response=$(curl -s -w "\n%{http_code}" \
            -X POST "${CPI_HOST}/api/v1/DeployIntegrationDesigntimeArtifact?Id='${ARTIFACT_ID}'&Version='active'" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json")
    fi

    HTTP_STATUS=$(echo "$curl_response" | tail -n1)
    RESPONSE_BODY=$(echo "$curl_response" | sed '$d')

    echo "HTTP Status: $HTTP_STATUS"
    echo "Response: $RESPONSE_BODY"

    if [[ "$HTTP_STATUS" -ne 200 && "$HTTP_STATUS" -ne 202 ]]; then
        echo "ERROR: Failed processing $ARTIFACT_NAME. HTTP Status: $HTTP_STATUS"
        FAILED=1
        DEPLOY_SUMMARY+=("FAILED: $ARTIFACT_NAME (ID: $ARTIFACT_ID) -- HTTP $HTTP_STATUS")
    else
        echo "Success: $ARTIFACT_NAME processed."
        DEPLOY_SUMMARY+=("SUCCESS: $ARTIFACT_NAME (ID: $ARTIFACT_ID) -- HTTP $HTTP_STATUS")
    fi

done < /path/to/iflows.json  # Update with the path to your JSON file containing the integration flows

# Print summary
echo "=============================================="
echo "Deployment Summary"
echo "=============================================="
for LINE in "${DEPLOY_SUMMARY[@]}"; do
    echo "  $LINE"
done

# Exit with error code if there were any failures
if [ "$FAILED" -ne 0 ]; then
    echo ""
    echo "One or more IFlows failed. See above for details."
    exit 1
else
    echo "All operations completed successfully."
fi
