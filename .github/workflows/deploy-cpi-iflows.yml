name: SAP CPI IFlow Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-iflows:
    runs-on: ubuntu-latest
    environment: dev  # Use the environment where secrets are stored
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CPI_CLIENT_ID: ${{ secrets.CPI_CLIENT_ID }}
      CPI_CLIENT_SECRET: ${{ secrets.CPI_CLIENT_SECRET }}
      CPI_TOKEN_URL: ${{ secrets.CPI_TOKEN_URL }}
      CPI_HOST: ${{ secrets.CPI_HOST }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Get OAuth Token
        id: get_token
        run: |
          BODY=$(curl -s -X POST "${CPI_TOKEN_URL}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CPI_CLIENT_ID}" \
            -d "client_secret=${CPI_CLIENT_SECRET}")

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')

          if [ -z "$TOKEN" ]; then
            echo "ERROR: Unable to retrieve OAuth Token"
            exit 1
          fi

          echo "$TOKEN" > /tmp/cpi_token.txt

      - name: Read Interfaces from JSON
        id: read_iflows
        run: |
          IFLOW_FILE=".github/workflows/Deployment_INTEGRATION_FLOW.json"
          if [ ! -f "$IFLOW_FILE" ]; then
            echo "ERROR: IFlow configuration file not found at $IFLOW_FILE."
            exit 1
          fi

          # Read the IntegrationFlows array from JSON using jq
          IFLOWS=$(jq -c '.PackageIntegrationFlowDeployments.IntegrationFlows[]' "$IFLOW_FILE")
          echo "$IFLOWS" > /tmp/iflows.txt

      - name: Deploy Integration Flows
        run: |
          TOKEN=$(cat /tmp/cpi_token.txt)
          while IFS= read -r IFLOW; do
            ARTIFACT_ID=$(echo "$IFLOW" | jq -r '.ArtifactID')
            ARTIFACT_NAME=$(echo "$IFLOW" | jq -r '.ArtifactName')
            DEPLOY=$(echo "$IFLOW" | jq -r '.Deploy')

            if [ "$DEPLOY" = "true" ]; then
              echo "Deploying: $ARTIFACT_NAME (ID: $ARTIFACT_ID)"

              # API call to deploy the integration flow
              HTTP_STATUS=$(curl -s -o /tmp/deploy_response.json -w "%{http_code}" \
                -X POST "${CPI_HOST}/api/v1/DeployIntegrationDesigntimeArtifact?Id='${ARTIFACT_ID}'&Version='Active'" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/json")

              if [ "$HTTP_STATUS" -eq 200 ]; then
                echo "Successfully deployed: $ARTIFACT_NAME"
              else
                echo "Failed to deploy: $ARTIFACT_NAME with HTTP status $HTTP_STATUS"
                cat /tmp/deploy_response.json
              fi
            fi
          done < /tmp/iflows.txt

      - name: Upload Deployment Response
        if: always()
        uses: actions/upload-artifact@v4  # Updated to v4
        with:
          name: deployment-response
          path: /tmp/deploy_response.json
