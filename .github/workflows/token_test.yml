#!/bin/bash

# Make sure these environment variables are set before running:
# export CPI_CLIENT_ID="your-client-id"
# export CPI_CLIENT_SECRET="your-client-secret"
# export CPI_TOKEN_URL="https://<subaccount>.authentication.<region>.hana.ondemand.com/oauth/token"
# export CPI_HOST="https://<your-cpi-host>.cfapps.<region>.hana.ondemand.com"

echo "Testing CPI OAuth token request..."
echo "Client ID: $CPI_CLIENT_ID"
echo "Client Secret: $CPI_CLIENT_SECRET"
echo "Token URL: $CPI_TOKEN_URL"

RESPONSE=$(curl -s -X POST \
  -u "$CPI_CLIENT_ID:$CPI_CLIENT_SECRET" \
  -H "Content-Type: application/x-www-form-urlencoded" \
  -d "grant_type=client_credentials" \
  "$CPI_TOKEN_URL")

echo "Raw response: $RESPONSE"

TOKEN=$(echo $RESPONSE | jq -r '.access_token')
echo "Extracted token: $TOKEN"

# Optional: test a simple API call with the token
if [ "$TOKEN" != "null" ] && [ -n "$TOKEN" ]; then
  echo "Testing API call to CPI host..."
  curl -s -H "Authorization: Bearer $TOKEN" \
       -H "Accept: application/json" \
       "$CPI_HOST/api/v1/IntegrationContentChangedInterfaces" \
       | jq .
else
  echo "No valid token received."
fi
