name: Sync CPI Interfaces

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # daily at 3 AM

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Get OAuth token
        id: get_token
        run: |
          echo "Fetching OAuth token..."
          RESPONSE=$(curl -s -X POST \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${{ secrets.CPI_TOKEN_URL }}")

          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Failed to fetch token"
            echo "Response: $RESPONSE"
            exit 1
          fi
          echo "✅ Token fetched successfully"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # Step 1: Fetch all interfaces (bootstrap + baseline)
      - name: Fetch all interfaces metadata
        run: |
          echo "Fetching all interfaces..."
          curl -s -X GET \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts?\$format=json" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -o all_flows.json

          jq -r '.d.results[].Id' all_flows.json > all_ids.txt
          jq -r '.d.results[].Version' all_flows.json > all_versions.txt

      # Step 2: Fetch changed interfaces (delta check)
      - name: Fetch changed interfaces metadata
        run: |
          echo "Fetching changed interfaces..."
          curl -s -X GET \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationContentChangedInterfaces?\$format=json" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -o changed_flows.json

          jq -r '.d.results[].Id' changed_flows.json > changed_ids.txt

      # Step 3: Clean old artifacts
      - name: Clean old artifacts
        run: |
          rm -rf cpi_artifacts
          mkdir -p cpi_artifacts

      # Step 4: Download interfaces (all on first run, only changed later)
      - name: Download interfaces
        run: |
          echo "Downloading interfaces..."
          IDS_FILE="changed_ids.txt"
          if [ ! -s "$IDS_FILE" ]; then
            echo "No changed interfaces found, using all interfaces (bootstrap run)"
            IDS_FILE="all_ids.txt"
          fi

          while read FLOW_ID; do
            FLOW_ID=$(echo $FLOW_ID | tr -d '"')
            echo "➡️ Processing $FLOW_ID"
            curl -s -X GET \
              "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts('$FLOW_ID')/Content" \
              -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
              -o "$FLOW_ID.zip"

            if [ ! -s "$FLOW_ID.zip" ]; then
              echo "⚠️ Failed to download $FLOW_ID"
              continue
            fi

            unzip -o "$FLOW_ID.zip" -d "cpi_artifacts/$FLOW_ID" >/dev/null
            rm "$FLOW_ID.zip"
          done < $IDS_FILE

      # Step 5: Commit and push changes
      - name: Commit and push changes
        run: |
          echo "Checking for changes..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cpi_artifacts
          if git diff --cached --quiet; then
            echo "✅ No changes detected"
          else
            echo "🚀 Changes detected, committing..."
            git commit -m "Sync CPI interfaces (auto)"
            git push
          fi
