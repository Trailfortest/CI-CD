name: Export iFlow from CPI

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get OAuth Token
        run: |
          echo "Requesting OAuth token..."

          RESPONSE=$(curl -s -X POST "${{ secrets.CPI_TOKEN_URL }}" \
          -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
          -d "grant_type=client_credentials")

          echo "OAuth Response:"
          echo $RESPONSE

          TOKEN=$(echo $RESPONSE | jq -r '.access_token')

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Download iFlow from CPI
        run: |
          echo "Downloading iFlow artifact..."

          curl -L \
          -H "Authorization: Bearer $TOKEN" \
          "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts('MyiFlow')/\$value" \
          -o MyiFlow.zip

      - name: Verify File
        run: |
          echo "Checking downloaded files..."
          ls -l

      - name: Commit and Push to GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add MyiFlow.zip

          git commit -m "Auto export iFlow from CPI $(date)" || echo "No changes"

          git push
