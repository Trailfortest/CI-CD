name: Export iFlow from CPI

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

     - name: Get OAuth Token
  run: |
    TOKEN=$(curl -s -X POST "${{ secrets.CPI_TOKEN_URL }}" \
    -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
    -d "grant_type=client_credentials" \
    | jq -r .access_token)

    echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Download iFlow
  run: |
    curl -L \
    -H "Authorization: Bearer $TOKEN" \
    "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts('MyiFlow')/\$value" \
    -o MyiFlow.zip

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add MyiFlow.zip
          git commit -m "Auto export from CPI"
          git push
