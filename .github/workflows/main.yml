name: Manual Sync All CPI Interfaces

on:
  workflow_dispatch:   # Only runs when triggered manually

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    environment: dev   # use the environment named 'dev'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get OAuth token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.CPI_TOKEN_URL }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.CPI_CLIENT_ID }}&client_secret=${{ secrets.CPI_CLIENT_SECRET }}")
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch all iFlows metadata
        run: |
          curl -s -X GET "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -o flows.json
          cat flows.json | jq '.d.results[].Id' > flow_ids.txt
          echo "Found flows:"
          cat flow_ids.txt

      - name: Download and unpack each iFlow
        run: |
          mkdir -p cpi_artifacts
          while read FLOW_ID; do
            FLOW_ID=$(echo $FLOW_ID | tr -d '"')
            echo "Downloading $FLOW_ID..."
            curl -s -X GET "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts('$FLOW_ID')/Content" \
              -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
              -o "$FLOW_ID.zip"
            unzip -o "$FLOW_ID.zip" -d "cpi_artifacts/$FLOW_ID"
          done < flow_ids.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cpi_artifacts
          git commit -m "Manual sync of all CPI interfaces" || echo "No changes to commit"
          git push
