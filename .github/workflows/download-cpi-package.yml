name: SAP CPI Interface Change Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  fetch-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Get OAuth Token
        id: get_token
        run: |
          echo "Fetching OAuth token..."
      
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://bd9d77d2trial.authentication.ap21.hana.ondemand.com/oauth/token" \
            -u "sb-1842f501-1670-4b45-bf38-74e901a14011!b109836|it!b196:b1c13681-861b-4aea-9ea9-689f1b388916$YSQErQxdWiw2FRC84YMtfm6KwUOvho1bI82QrReSf8U=" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")
      
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
      
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body: $BODY"
      
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ HTTP $HTTP_STATUS"
            exit 1
          fi
      
          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "❌ Token missing"
            exit 1
          fi
      
          echo "✅ Token fetched"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
