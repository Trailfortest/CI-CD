name: Download All CPI Interfaces (Debug)

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated package names (e.g. test,POC)"
        required: true
        type: string
      commit-message:
        description: "Commit message"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    environment: dev   # use the environment where secrets are stored

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_CICD_TOKEN }}
          ref: main

      - name: Get OAuth Token (Debug)
        id: get_token
        run: |
          echo "Using client ID: ${{ secrets.CPI_CLIENT_ID }}"
          echo "Using client Secret: ${{ secrets.CPI_CLIENT_SECRET }}"
          echo "Token URL: ${{ secrets.CPI_TOKEN_URL }}"

          RESPONSE=$(curl -s -X POST \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${{ secrets.CPI_TOKEN_URL }}")

          echo "Raw response: $RESPONSE"

          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "Extracted token: $TOKEN"

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to fetch token"
            exit 1
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Download Interfaces
        run: |
          TOKEN="${{ steps.get_token.outputs.token }}"
          for PACKAGE in $(echo "${{ github.event.inputs.packages }}" | tr ',' ' '); do
            echo "Fetching artifacts from package $PACKAGE..."
            ARTIFACTS=$(curl -s -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" \
              "${{ secrets.CPI_HOST }}/api/v1/IntegrationPackages('${PACKAGE}')/IntegrationDesigntimeArtifacts")

            echo "Raw artifacts response for $PACKAGE: $ARTIFACTS"
            echo "$ARTIFACTS" > "IntegrationPackages/${PACKAGE}_artifacts.json"

            echo "$ARTIFACTS" | jq -c '.d.results[]' | while read -r artifact; do
              ID=$(echo $artifact | jq -r '.Id')
              NAME=$(echo $artifact | jq -r '.Name')
              VERSION=$(echo $artifact | jq -r '.Version')

              echo "Downloading artifact $NAME (Id=$ID, Version=$VERSION)..."
              mkdir -p "IntegrationPackages/${PACKAGE}"
              curl -s -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/octet-stream" \
                "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts('${ID}','${NAME}','${VERSION}')/\$value" \
                -o "IntegrationPackages/${PACKAGE}/${NAME}_${VERSION}.zip"
            done
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add IntegrationPackages || true
          git commit -m "${{ github.event.inputs.commit-message }}" || echo "No changes to commit"
          git push
