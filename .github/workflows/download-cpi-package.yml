name: SAP CPI Interface Change Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # Daily at 3 AM UTC

jobs:
  fetch-changes:
    runs-on: ubuntu-latest
    environment: dev
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CPI_CLIENT_ID: ${{ secrets.CPI_CLIENT_ID }}
      CPI_CLIENT_SECRET: ${{ secrets.CPI_CLIENT_SECRET }}
      CPI_TOKEN_URL: ${{ secrets.CPI_TOKEN_URL }}
      CPI_HOST: ${{ secrets.CPI_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # needed for push permission

      - name: Get OAuth Token
        id: get_token
        shell: bash
        run: |
          BODY=$(curl -s -X POST \
            "${CPI_TOKEN_URL}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CPI_CLIENT_ID}" \
            -d "client_secret=${CPI_CLIENT_SECRET}")

          TOKEN=$(printf '%s' "${BODY}" | jq -r '.access_token // empty' 2>/dev/null || true)

          if [ "${#TOKEN}" -lt 10 ]; then
            echo "ERROR: Token is empty or too short. Check credentials."
            exit 1
          fi

          printf '%s' "${TOKEN}" > /tmp/cpi_token.txt
          echo "Token saved successfully. Length: ${#TOKEN}"

      - name: Fetch iFlow as ZIP
        shell: bash
        run: |
          TOKEN=$(cat /tmp/cpi_token.txt)
          BASE_URL="${CPI_HOST%/}"
          FULL_URL="${BASE_URL}/api/v1/IntegrationDesigntimeArtifacts(Id='MyiFlow',Version='Active')/\$value"

          echo "Calling: ${FULL_URL}"

          HTTP_STATUS=$(curl -s \
            -o MyiFlow.zip \
            -w "%{http_code}" \
            -X GET \
            "${FULL_URL}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/octet-stream")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "ERROR: API failed with status $HTTP_STATUS"
            cat MyiFlow.zip
            exit 1
          fi

          # Verify it is a valid ZIP
          if ! file MyiFlow.zip | grep -q "Zip archive"; then
            echo "ERROR: Downloaded file is not a valid ZIP"
            cat MyiFlow.zip
            exit 1
          fi

          echo "ZIP verified. Contents:"
          unzip -l MyiFlow.zip

          # Extract into the target repo folder
          mkdir -p CI-CD/.github/workflows/MyiFlow
          unzip -o MyiFlow.zip -d CI-CD/.github/workflows/MyiFlow

          echo "Extracted files:"
          find CI-CD/.github/workflows/MyiFlow -type f

      - name: Commit and Push to Repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all extracted files
          git add CI-CD/.github/workflows/MyiFlow/

          # Check if there are any changes to commit
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "chore: update MyiFlow from SAP CPI - ${TIMESTAMP}"
            git push
            echo "Changes committed and pushed successfully."
          fi
