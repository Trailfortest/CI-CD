name: SAP CPI - Fetch Interfaces and Save to Repository

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # Daily at 2 AM

jobs:
  fetch-interfaces:
    runs-on: ubuntu-latest
    environment: dev   # Use the environment where secrets are stored

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # STEP 1: Get OAuth Bearer Token
      # ─────────────────────────────────────────────
      - name: Get Bearer Token
        id: get_token
        run: |
          echo "Fetching OAuth token..."
  
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${{ secrets.CPI_TOKEN_URL }}")
  
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
  
          echo "Token endpoint HTTP status: $HTTP_CODE"
  
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch token. HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
  
          TOKEN=$(echo "$BODY" | jq -r '.access_token')
  
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Token is empty or null. Check your credentials."
            exit 1
          fi
  
          echo "Token fetched successfully."
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # STEP 2: Fetch Interfaces using Bearer Token
      # ─────────────────────────────────────────────
      - name: Fetch Interfaces
        id: fetch_interfaces
        run: |
          echo "Fetching interfaces..."
  
          HTTP_CODE=$(curl -s -o interfaces.json -w "%{http_code}" -X GET \
            "${{ secrets.CPI_HOST }}/v1/IntegrationDesigntimeArtifacts" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Accept: application/json")
  
          echo "Fetch interfaces HTTP status: $HTTP_CODE"
  
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch interfaces. HTTP Status: $HTTP_CODE"
            exit 1
          fi
  
          echo "Interfaces fetched successfully."

      # ─────────────────────────────────────────────
      # STEP 3: Save Interfaces to Repository
      # ─────────────────────────────────────────────
      - name: Save Interfaces to Repository
        run: |
          echo "Saving interfaces..."
  
          # Create directory if it does not exist
          mkdir -p cicd_folder/interfaces
  
          # Move the fetched interfaces JSON file to the CI/CD folder
          mv interfaces.json cicd_folder/interfaces/
          echo "Interfaces saved to cicd_folder/interfaces/."

      # ─────────────────────────────────────────────
      # STEP 4: Commit and Push Changes
      # ─────────────────────────────────────────────
      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add changes to commit
          git add cicd_folder/interfaces/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes detected. Nothing to commit."
          else
            git commit -m "chore: update interfaces - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "Changes committed and pushed successfully."
          fi
