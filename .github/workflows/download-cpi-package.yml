name: Fetch MyiFlow Active Version

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # daily at 3 AM

jobs:
  fetch-myflow:
    runs-on: ubuntu-latest
    environment: dev   # use the environment where secrets are stored

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get OAuth Token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${{ secrets.CPI_TOKEN_URL }}")

          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch MyiFlow Active Version
        id: fetch_myflow
        run: |
          # Fetch all integration design-time artifacts
          curl -s -X GET \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts?$filter=Id eq 'MyiFlow'&$format=json" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Accept: application/json" \
            -o myiflow_versions.json
          
          # Extract the active version
          ACTIVE_VERSION=$(jq -r '.[] | select(.version == "Active") | .version' myiflow_versions.json)

          if [ -z "$ACTIVE_VERSION" ]; then
            echo "No active version found for MyiFlow."
            exit 1
          else
            echo "Active version found: $ACTIVE_VERSION"
          fi

          # Fetch the content for the active version
          curl -s -X GET \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts(Id='MyiFlow',Version='Active')/$value" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -o "MyiFlow-Active.zip"

      - name: Upload Active Version
        uses: actions/upload-artifact@v4
        with:
          name: MyiFlow-Active-Version
          path: MyiFlow-Active.zip
