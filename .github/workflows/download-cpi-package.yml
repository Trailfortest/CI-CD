name: Download CPI Package into GIT

on:
  workflow_dispatch:   # trigger manually from Actions tab
    inputs:
      ids:
        description: "Comma-separated IDs"
        required: true
        type: string
      mode:
        description: "IntegrationPackages or PartnerDirectory"
        required: true
        type: string
      commit-message:
        description: "Commit message"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_CICD_TOKEN }}
          ref: main

      - name: Parse IDs
        id: parse-ids
        run: |
          IFS=',' read -ra IDS <<< "${{ github.event.inputs.ids }}"
          JSON_ARRAY="["
          for i in "${!IDS[@]}"; do
            ID=$(echo "${IDS[$i]}" | xargs)
            if [ $i -gt 0 ]; then JSON_ARRAY="${JSON_ARRAY},"; fi
            JSON_ARRAY="${JSON_ARRAY}\"${ID}\""
          done
          JSON_ARRAY="${JSON_ARRAY}]"
          echo "ids-json=${JSON_ARRAY}" >> $GITHUB_OUTPUT

      - name: Request OAuth Token
        id: get-token
        run: |
          RESPONSE=$(curl -s -X POST \
            -u "${{ secrets.BTP_API_USER }}:${{ secrets.BTP_API_PASSWORD }}" \
            -d "grant_type=password&username=${{ secrets.BTP_TEC_USER }}&password=${{ secrets.BTP_TEC_PASSWORD }}" \
            https://bd9d77d2trial.authentication.ap21.hana.ondemand.com/oauth/token)
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Download IDs
        run: |
          TOKEN="${{ steps.get-token.outputs.token }}"
          for ID in $(echo ${{ steps.parse-ids.outputs.ids-json }} | jq -r '.[]'); do
            if [ "${{ github.event.inputs.mode }}" = "IntegrationPackages" ]; then
              echo "Downloading package $ID..."
              curl -s -H "Authorization: Bearer $TOKEN" \
                "https://bd9d77d2trial.it-cpitrial03.cfapps.ap21.hana.ondemand.com/api/v1/IntegrationPackages/$ID" \
                -o "IntegrationPackages/${ID}.json"
            else
              echo "Downloading partner directory $ID..."
              curl -s -H "Authorization: Bearer $TOKEN" \
                "https://bd9d77d2trial.it-cpitrial03.cfapps.ap21.hana.ondemand.com/api/v1/PartnerDirectory/$ID" \
                -o "PartnerDirectory/${ID}.json"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add IntegrationPackages PartnerDirectory || true
          git commit -m "${{ github.event.inputs.commit-message }}" || echo "No changes to commit"
          git push
