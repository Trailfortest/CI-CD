name: SAP CPI Fetch All Interfaces

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # Daily at 3 AM UTC

permissions:
  contents: write

jobs:
  fetch-all-interfaces:
    runs-on: ubuntu-latest
    environment: dev
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CPI_CLIENT_ID: ${{ secrets.CPI_CLIENT_ID }}
      CPI_CLIENT_SECRET: ${{ secrets.CPI_CLIENT_SECRET }}
      CPI_TOKEN_URL: ${{ secrets.CPI_TOKEN_URL }}
      CPI_HOST: ${{ secrets.CPI_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0     # fetch full history to avoid conflicts

      - name: Get OAuth Token
        shell: bash
        run: |
          BODY=$(curl -s -X POST \
            "${CPI_TOKEN_URL}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CPI_CLIENT_ID}" \
            -d "client_secret=${CPI_CLIENT_SECRET}")

          TOKEN=$(printf '%s' "${BODY}" | jq -r '.access_token // empty' 2>/dev/null || true)

          if [ "${#TOKEN}" -lt 10 ]; then
            echo "ERROR: Token is empty or too short"
            exit 1
          fi

          printf '%s' "${TOKEN}" > /tmp/cpi_token.txt
          echo "Token saved. Length: ${#TOKEN}"

      - name: Fetch All Packages and iFlows
        shell: bash
        run: |
          TOKEN=$(cat /tmp/cpi_token.txt)
          BASE_URL="${CPI_HOST%/}"

          # ── Step 1: Get all packages ───────────────────────────────────
          echo "Fetching all packages..."
          curl -s -X GET \
            "${BASE_URL}/api/v1/IntegrationPackages" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json" \
            | jq '[.d.results[] | {Id, Name, Version}]' \
            > all_packages.json

          echo "Packages found:"
          cat all_packages.json
          echo "Total packages: $(cat all_packages.json | jq length)"

          # ── Step 2: Get iFlows per package ─────────────────────────────
          echo "[]" > all_iflows.json

          while IFS= read -r PKG_ID; do
            echo "──────────────────────────────────────"
            echo "Fetching iFlows for package: ${PKG_ID}"

            RESPONSE=$(curl -s -X GET \
              "${BASE_URL}/api/v1/IntegrationPackages('${PKG_ID}')/IntegrationDesigntimeArtifacts" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/json")

            RESULTS=$(echo "${RESPONSE}" | jq '.d.results // []')
            COUNT=$(echo "${RESULTS}" | jq length)
            echo "iFlows in ${PKG_ID}: ${COUNT}"

            if [ "$COUNT" -gt 0 ]; then
              jq --argjson existing "$(cat all_iflows.json)" \
                --argjson new "$RESULTS" \
                '$existing + ($new | map({
                  Id,
                  Name,
                  Version,
                  PackageId,
                  ModifiedAt,
                  CreatedAt,
                  Description
                }))' \
                all_iflows.json > all_iflows_tmp.json \
                && mv all_iflows_tmp.json all_iflows.json
            fi

          done < <(jq -r '.[].Id' all_packages.json)

          echo "=============================="
          echo "All iFlows:"
          cat all_iflows.json | jq .
          echo "Total iFlows: $(cat all_iflows.json | jq length)"

      - name: Compare Versions and Generate Report
        shell: bash
        run: |
          PREVIOUS="CI-CD/.github/workflows/iflows/all_iflows.json"
          CURRENT="all_iflows.json"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          REPORT="CI-CD/.github/workflows/iflows/version_report.md"

          mkdir -p CI-CD/.github/workflows/iflows

          echo "# SAP CPI Interface Version Report" > $REPORT
          echo "" >> $REPORT
          echo "**Generated:** ${TIMESTAMP}" >> $REPORT
          echo "" >> $REPORT

          # ── All current interfaces ─────────────────────────────────────
          echo "## All Interfaces" >> $REPORT
          echo "" >> $REPORT
          echo "| Interface ID | Name | Version | Package | Last Modified |" >> $REPORT
          echo "|---|---|---|---|---|" >> $REPORT
          jq -r '.[] | "| \(.Id) | \(.Name) | \(.Version) | \(.PackageId) | \(.ModifiedAt) |"' \
            $CURRENT >> $REPORT
          echo "" >> $REPORT

          # ── Compare with previous run ──────────────────────────────────
          if [ -f "$PREVIOUS" ]; then
            echo "## Changed Interfaces Since Last Run" >> $REPORT
            echo "" >> $REPORT
            echo "| Interface ID | Name | Old Version | New Version | Package |" >> $REPORT
            echo "|---|---|---|---|---|" >> $REPORT

            CHANGED=0
            while IFS= read -r IFLOW_ID; do
              CURRENT_VERSION=$(jq -r --arg id "$IFLOW_ID" '.[] | select(.Id == $id) | .Version' $CURRENT)
              CURRENT_NAME=$(jq -r --arg id "$IFLOW_ID" '.[] | select(.Id == $id) | .Name' $CURRENT)
              CURRENT_PKG=$(jq -r --arg id "$IFLOW_ID" '.[] | select(.Id == $id) | .PackageId' $CURRENT)
              OLD_VERSION=$(jq -r --arg id "$IFLOW_ID" '.[] | select(.Id == $id) | .Version' $PREVIOUS 2>/dev/null || echo "")

              if [ -z "$OLD_VERSION" ] || [ "$OLD_VERSION" = "null" ]; then
                echo "| $IFLOW_ID | $CURRENT_NAME | ➕ NEW | $CURRENT_VERSION | $CURRENT_PKG |" >> $REPORT
                CHANGED=$((CHANGED + 1))
              elif [ "$OLD_VERSION" != "$CURRENT_VERSION" ]; then
                echo "| $IFLOW_ID | $CURRENT_NAME | $OLD_VERSION | $CURRENT_VERSION | $CURRENT_PKG |" >> $REPORT
                CHANGED=$((CHANGED + 1))
              fi
            done < <(jq -r '.[].Id' $CURRENT)

            if [ "$CHANGED" -eq 0 ]; then
              echo "| — | No changes detected | — | — | — |" >> $REPORT
            fi

            echo "" >> $REPORT
            echo "## Deleted Interfaces" >> $REPORT
            echo "" >> $REPORT
            echo "| Interface ID | Name | Last Known Version |" >> $REPORT
            echo "|---|---|---|" >> $REPORT

            DELETED=0
            while IFS= read -r OLD_ID; do
              EXISTS=$(jq -r --arg id "$OLD_ID" '.[] | select(.Id == $id) | .Id' $CURRENT)
              if [ -z "$EXISTS" ]; then
                OLD_NAME=$(jq -r --arg id "$OLD_ID" '.[] | select(.Id == $id) | .Name' $PREVIOUS)
                OLD_VER=$(jq -r --arg id "$OLD_ID" '.[] | select(.Id == $id) | .Version' $PREVIOUS)
                echo "| $OLD_ID | $OLD_NAME | $OLD_VER |" >> $REPORT
                DELETED=$((DELETED + 1))
              fi
            done < <(jq -r '.[].Id' $PREVIOUS)

            if [ "$DELETED" -eq 0 ]; then
              echo "| — | No deletions detected | — |" >> $REPORT
            fi

            echo "" >> $REPORT
            echo "## Summary" >> $REPORT
            echo "" >> $REPORT
            echo "| Metric | Count |" >> $REPORT
            echo "|---|---|" >> $REPORT
            echo "| Total Interfaces | $(jq length $CURRENT) |" >> $REPORT
            echo "| Changed / New    | $CHANGED |" >> $REPORT
            echo "| Deleted          | $DELETED |" >> $REPORT

          else
            echo "## Version Changes" >> $REPORT
            echo "" >> $REPORT
            echo "> ⚠️ No previous data found. This is the first run — baseline established." >> $REPORT
            echo "" >> $REPORT
            echo "## Summary" >> $REPORT
            echo "" >> $REPORT
            echo "| Metric | Count |" >> $REPORT
            echo "|---|---|" >> $REPORT
            echo "| Total Interfaces | $(jq length $CURRENT) |" >> $REPORT
            echo "| Changed / New    | — |" >> $REPORT
            echo "| Deleted          | — |" >> $REPORT
          fi

          echo "=============================="
          echo "REPORT PREVIEW:"
          cat $REPORT

      - name: Download Each iFlow as ZIP
        shell: bash
        run: |
          TOKEN=$(cat /tmp/cpi_token.txt)
          BASE_URL="${CPI_HOST%/}"
          IFLOW_IDS=$(cat all_iflows.json | jq -r '.[].Id')

          mkdir -p CI-CD/.github/workflows/iflows

          for IFLOW_ID in $IFLOW_IDS; do
            echo "──────────────────────────────────────"
            echo "Downloading iFlow: ${IFLOW_ID}"

            HTTP_STATUS=$(curl -s \
              -o "${IFLOW_ID}.zip" \
              -w "%{http_code}" \
              -X GET \
              "${BASE_URL}/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='Active')/\$value" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/octet-stream")

            echo "HTTP Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "WARNING: Failed to download ${IFLOW_ID} (status $HTTP_STATUS), skipping..."
              continue
            fi

            if file "${IFLOW_ID}.zip" | grep -q "Zip archive"; then
              mkdir -p "CI-CD/.github/workflows/iflows/${IFLOW_ID}"
              unzip -o "${IFLOW_ID}.zip" -d "CI-CD/.github/workflows/iflows/${IFLOW_ID}"
              echo "Extracted: ${IFLOW_ID}"
            else
              echo "WARNING: ${IFLOW_ID}.zip is not a valid ZIP, skipping..."
            fi
          done

      - name: Save Inventory Files
        shell: bash
        run: |
          cp all_packages.json CI-CD/.github/workflows/iflows/all_packages.json
          cp all_iflows.json   CI-CD/.github/workflows/iflows/all_iflows.json

      - name: Commit and Push to Repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CI-CD/.github/workflows/iflows/

          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "chore: sync SAP CPI iFlows - ${TIMESTAMP}"

            # Pull latest remote changes before pushing
            git pull --rebase origin main

            git push origin main
            echo "Committed and pushed successfully."
          fi
