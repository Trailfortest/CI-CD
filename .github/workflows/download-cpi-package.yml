name: SAP CPI Interface Change Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # Daily at 3 AM

jobs:
  fetch-changes:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # Step 1: Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Install jq (required)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Step 3: Get OAuth Token
      - name: Get OAuth Token
        id: get_token
        run: |
          echo "Fetching OAuth token..."

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${{ secrets.CPI_TOKEN_URL }}")

          BODY=$(echo "$RESPONSE" | sed -n '1p')
          STATUS=$(echo "$RESPONSE" | sed -n '2p')

          echo "HTTP Status: $STATUS"
          echo "Response Body: $BODY"

          TOKEN=$(echo $BODY | jq -r '.access_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Failed to retrieve token"
            exit 1
          fi

          echo "✅ Token fetched successfully"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # Step 4: Fetch Changed Interfaces (Last 24 hours)
      - name: Fetch Changed Interfaces
        run: |
          echo "Fetching interfaces modified in last 24 hours..."

          LAST_DATE=$(date -u -d "1 day ago" +"%Y-%m-%dT%H:%M:%S")

          echo "Filtering from: $LAST_DATE"

          curl -v -X GET \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts?\$filter=LastModified ge datetime'$LAST_DATE'" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Accept: application/json" \
            -o changed_interfaces.json

          echo "Preview of response:"
          cat changed_interfaces.json | head -50

      # Step 5: (Optional) Download specific iFlow ZIP
      # 👉 Replace 'MyiFlow' if needed
      - name: Download iFlow Artifact (ZIP)
        run: |
          echo "Downloading iFlow artifact..."

          curl -L -X GET \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts(Id='MyiFlow',Version='Active')/\$value" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Accept: application/zip" \
            -o iflow.zip

          echo "File type:"
          file iflow.zip

      # Step 6: Upload Outputs
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: cpi-results
          path: |
            changed_interfaces.json
            iflow.zip
