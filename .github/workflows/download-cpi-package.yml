name: Download All CPI iFlows

on:
  workflow_dispatch:   # manual trigger
  schedule:
    - cron: "0 3 * * *"   # daily at 3 AM

permissions:
  contents: write

jobs:
  download-all-iflows:
    runs-on: ubuntu-latest
    environment: dev   # secrets stored here

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_CICD_TOKEN }}
          ref: main

      - name: Get OAuth Token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${{ secrets.CPI_TOKEN_URL }}")

          echo "Raw token response: $RESPONSE"
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to fetch token"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Download All iFlows
        run: |
          TOKEN="${{ steps.get_token.outputs.token }}"

          echo "Fetching all packages..."
          PACKAGES=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationPackages")

          echo "$PACKAGES" > packages.json

          echo "$PACKAGES" | jq -c '.d.results[]' | while read -r pkg; do
            PACKAGE_ID=$(echo $pkg | jq -r '.Id')
            echo "Fetching artifacts for package $PACKAGE_ID..."

            ARTIFACTS=$(curl -s -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" \
              "${{ secrets.CPI_HOST }}/api/v1/IntegrationPackages('${PACKAGE_ID}')/IntegrationDesigntimeArtifacts")

            echo "$ARTIFACTS" > "IntegrationPackages/${PACKAGE_ID}_artifacts.json"

            echo "$ARTIFACTS" | jq -c '.d.results[]' | while read -r artifact; do
              ID=$(echo $artifact | jq -r '.Id')
              NAME=$(echo $artifact | jq -r '.Name')
              VERSION=$(echo $artifact | jq -r '.Version')

              echo "Downloading artifact $NAME (Id=$ID, Version=$VERSION)..."
              mkdir -p "IntegrationPackages/${PACKAGE_ID}"
              curl -s -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/octet-stream" \
                "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts('${ID}','${NAME}','${VERSION}')/\$value" \
                -o "IntegrationPackages/${PACKAGE_ID}/${NAME}_${VERSION}.zip"
            done
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add IntegrationPackages || true
          git commit -m "Downloaded latest CPI iFlows" || echo "No changes to commit"
          git push
