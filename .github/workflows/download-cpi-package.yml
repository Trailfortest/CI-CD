name: Download MyiFlow

on:
  workflow_dispatch:
    inputs:
      commit-message:
        description: "Commit message"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download-myiflow:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_CICD_TOKEN }}
          ref: main

      - name: Get OAuth Token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${{ secrets.CPI_TOKEN_URL }}")

          echo "Raw token response: $RESPONSE"
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to fetch token"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Download MyiFlow
        run: |
          TOKEN="${{ steps.get_token.outputs.token }}"

          echo "Fetching metadata for MyiFlow..."
          METADATA=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts?\$filter=Name eq 'MyiFlow'")

          echo "Metadata: $METADATA"

          ID=$(echo $METADATA | jq -r '.d.results[0].Id')
          NAME=$(echo $METADATA | jq -r '.d.results[0].Name')
          VERSION=$(echo $METADATA | jq -r '.d.results[0].Version')

          echo "Downloading artifact $NAME (Id=$ID, Version=$VERSION)..."
          mkdir -p "IntegrationPackages/${NAME}"
          curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/octet-stream" \
            "${{ secrets.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts('${ID}','${NAME}','${VERSION}')/\$value" \
            -o "IntegrationPackages/${NAME}/${NAME}_${VERSION}.zip"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add IntegrationPackages || true
          git commit -m "${{ github.event.inputs.commit-message }}" || echo "No changes to commit"
          git push
