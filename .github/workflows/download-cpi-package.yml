name: SAP CPI Interface Change Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  fetch-changes:
    runs-on: ubuntu-latest
    environment: dev      timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get OAuth Token
        id: get_token
        run: |
          echo "Fetching OAuth token..."
      
          # Debug: verify secret lengths (doesn't expose values)
          echo "CLIENT_ID length: $(echo -n '${{ secrets.CPI_CLIENT_ID }}' | wc -c)"
          echo "SECRET length: $(echo -n '${{ secrets.CPI_CLIENT_SECRET }}' | wc -c)"
          echo "TOKEN_URL: ${{ secrets.CPI_TOKEN_URL }}"
      
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ secrets.CPI_TOKEN_URL }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${{ secrets.CPI_CLIENT_ID }}" \
            --data-urlencode "client_secret=${{ secrets.CPI_CLIENT_SECRET }}")
      
          # Split body and status
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
      
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body: $BODY"
      
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ HTTP $HTTP_STATUS from token endpoint"
            exit 1
          fi
      
          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "❌ Token missing in response"
            exit 1
          fi
      
          echo "✅ Token fetched successfully"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
