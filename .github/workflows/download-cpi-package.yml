name: Download BTP Artifacts

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get OAuth Token
        id: auth
        run: |
          TOKEN=$(curl -s -X POST "${{ secrets.CPI_TOKEN_URL }}" \
            -d "grant_type=client_credentials" \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" | jq -r .access_token)

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Artifact List
        id: artifacts
        run: |
          curl -s -X GET "${{ secrets.CPI_HOST }}/IntegrationDesigntimeArtifacts" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Accept: application/json" > artifacts.json

          cat artifacts.json

      - name: Download All Artifacts
        run: |
          mkdir -p artifacts

          for id in $(jq -r '.d.results[].Id' artifacts.json); do
            echo "Downloading $id..."

            curl -L -X GET \
              "${{ secrets.SAP_API_URL }}/IntegrationDesigntimeArtifacts(Id='$id',Version='active')/\$value" \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              --output "artifacts/$id.zip"
          done

      - name: Commit & Push Artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add artifacts/
          git commit -m "Downloaded SAP artifacts" || echo "No changes"
          git push
